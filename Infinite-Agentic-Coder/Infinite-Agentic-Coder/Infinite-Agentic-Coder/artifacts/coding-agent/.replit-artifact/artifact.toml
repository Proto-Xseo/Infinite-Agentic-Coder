kind = "web"
previewPath = "/"
title = "Coding Agent"
version = "1.0.0"
id = "artifacts/coding-agent"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21440

[services.development]
run = "pnpm --filter @workspace/coding-agent run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/coding-agent", "run", "build" ]
publicDir = "artifacts/coding-agent/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21440"
BASE_PATH = "/"
